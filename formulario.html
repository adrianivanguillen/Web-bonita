<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>

    <h2>Iniciar sesión</h2>

    <form action="#" method="post">
        <label for="id_usuario">User</label>
        <input type="text"  id="id_user" name="User" required maxlength="12" minlength="6">
    <br>
        <label for="id_password">Password</label>
        <input type="password"  id="id_password" name="Password" required maxlength="12" minlength="6">
    <br>
        <button type="submit">Enviar</button>
    </form>

</body>
</html>
